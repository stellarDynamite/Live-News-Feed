<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News App</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <nav>

    <div class="main-nav">

        <a href="#" onclick="reload()" class="company-logo">
            NEWS
        </a>

        <div class="nav-links">

            <ul>

                <li class="hover-link nav-item"
                    id="technology"
                    onclick="onNavItemClick('technology')">
                    Technology
                </li>

                <li class="hover-link nav-item"
                    id="sports"
                    onclick="onNavItemClick('sports')">
                    Sports
                </li>

                <li class="hover-link nav-item"
                    id="science"
                    onclick="onNavItemClick('science')">
                    Science
                </li>

            </ul>

        </div>

        <div class="search-bar">

            <input
                id="search-text"
                type="text"
                class="news-input"
                placeholder="Search news..."
            >

            <button
                id="search-button"
                class="search-button">
                Search
            </button>

        </div>

    </div>

</nav>

<div class="layout">

    <aside class="sidebar">

        <h2>Category</h2>

        <ul>

            <li onclick="fetchNews('technology')">
                Technology
            </li>

            <li onclick="fetchNews('sports')">
                Sports
            </li>

            <li onclick="fetchNews('science')">
                Science
            </li>

            <li onclick="fetchNews('health')">
                Health
            </li>

            <li onclick="fetchNews('business')">
                Business
            </li>

            <li onclick="fetchNews('politics')">
                Politics
            </li>

        </ul>

    </aside>

    <main>

        <div class="hero">

            <h1>
                Today's Headlines
            </h1>

            <p>
                Stay updated with trending stories around the world.
            </p>

        </div>

        <div
            class="cards-container"
            id="cards-container">

        </div>

    </main>

</div>

    <template id="template-news-card">

        <div class="card">

            <div class="card-header">

                <img
                    src="https://via.placeholder.com/400x200"
                    alt=""
                    id="news-img"
                >

            </div>

            <div class="card-content">

                <h3 id="news-title">
                    Title
                </h3>

                <h6
                    class="news-source"
                    id="news-source">

                    Source

                </h6>

                <p
                    class="news-desc"
                    id="news-desc">

                    Description

                </p>

            </div>

        </div>

    </template>
    <script src="script.js"></script>

</body>
</html>
